<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#2C2C2C;font-family:'Segoe UI',system-ui,sans-serif;padding:20px 16px;color:#EDE9DF;line-height:1.7}
textarea{font-family:'Courier New',monospace;width:100%;min-height:160px;padding:12px 14px;font-size:14px;line-height:1.8;background:#1E1E1E;border:1.5px solid #4A4A4A;border-radius:8px;resize:vertical;color:#EDE9DF;outline:none;display:block;letter-spacing:.02em}

.sub{font-size:11px;font-family:'Segoe UI',system-ui,sans-serif;color:#888;letter-spacing:.09em;font-weight:600;margin-bottom:8px;text-transform:uppercase}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.mc{background:#2C2C2C;border-radius:8px;padding:12px 14px;border:1px solid #4A4A4A}
.tabt{padding:6px 16px;font-size:12px;border:1px solid #4A4A4A;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif;color:#888;background:#2C2C2C}
.dot{width:30px;height:30px;border-radius:50%;font-size:11px;cursor:pointer;transition:transform .1s;font-family:'Segoe UI',system-ui,sans-serif}
.dot:hover{transform:scale(1.12)}
.hint{background:none;border:1px dashed #4A4A4A;border-radius:6px;padding:5px 12px;font-size:12px;color:#888;margin-top:12px;letter-spacing:.02em}
.hint:hover{background:#3A3A3A;color:#EDE9DF}
.nav{background:none;border:1px solid #4A4A4A;border-radius:6px;padding:6px 14px;font-size:12px;color:#888}
.nav:hover{background:#3A3A3A;color:#EDE9DF}
.chk{color:#1A1A1A;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;letter-spacing:.03em;background:#D97706}
.chk:hover{opacity:.9}
.tog{margin-top:14px;background:none;border:1px solid #4A4A4A;border-radius:6px;padding:6px 14px;font-size:12px;color:#888}
.tog:hover{background:#3A3A3A;color:#EDE9DF}
.back{font-size:13px;font-family:'Segoe UI',system-ui,sans-serif;color:#888;text-decoration:none;margin-bottom:18px;display:inline-block;letter-spacing:.02em}
.back:hover{color:#EDE9DF}
.mswitch{display:flex;gap:0;margin-bottom:22px;border-radius:10px;overflow:hidden;border:1px solid #4A4A4A}
.mswitch button{flex:1;padding:14px 8px;font-size:13px;border:none;background:#363636;color:#888;transition:background .15s,color .15s;line-height:1.4;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.02em}
.mswitch button.active{background:#D97706;color:#1A1A1A;font-weight:700}
.mswitch button:first-child{border-right:1px solid #4A4A4A}
.fix-hint pre{background:#1A1A1A;border-left:3px solid #D97706;border-radius:0 6px 6px 0;font-size:12px;padding:10px 14px;margin-top:6px;white-space:pre-wrap;color:#C8C4BA}
@media(max-width:520px){.two{grid-template-columns:1fr}}</style>

dius * radius and RETURN correct.", "fix": "    SET area TO 3.14 * radius * radius\n    RETURN area"}, {"label": "SET result + SEND with &", "need_all": ["circlearea(", "send", "&", "result", "to display"], "ok": "Function called and result sent to display.", "fix": "SET result TO circleArea(5)\nSEND \"Area: \" & result TO DISPLAY"}], "python": [{"label": "def circleArea(radius):", "must": ["def circlearea(radius):"], "ok": "def circleArea(radius): correct.", "fix": "def circleArea(radius):"}, {"label": "area = 3.14 * radius * radius + return", "need_all": ["3.14", "radius * radius", "return area"], "ok": "area = 3.14 * radius * radius and return correct.", "fix": "    area = 3.14 * radius * radius\n    return area"}, {"label": "Call + print with str() and +", "need_all": ["circlearea(", "print(", "str(result)", "+"], "ok": "Function called and printed correctly.", "fix": "result = circleArea(5)\nprint(\"Area: \" + str(result))"}]}}, {"id": 5, "title": "String length", "difficulty": "Starter", "construct": "String operation — LEN", "scenario": "Write a program that asks the user to enter a word. Display the length of the word, e.g. 'Length: 5'.", "python": "word = input(\"Enter a word: \")\nlength = len(word)\nprint(\"Length: \" + str(length))", "pseudo": "get word from user\nset length to len(word)\ndisplay \"Length: \" + length", "sqarl": "RECEIVE word FROM KEYBOARD\nSET length TO LEN(word)\nSEND \"Length: \" & length TO DISPLAY", "validation": {"pseudo": [{"label": "get word + set length to len(word)", "need_all": [["get word", "word from user"], "set length to len(word)"], "ok": "Input and len(word) correct.", "fix": "get word from user\nset length to len(word)"}, {"label": "display length with +", "need_all": ["display", "length", "+"], "ok": "Length displayed with +.", "fix": "display \"Length: \" + length"}], "sqarl": [{"label": "RECEIVE word + SET length TO LEN(word)", "need_all": ["receive word from keyboard", "set length to len(word)"], "ok": "RECEIVE and function norm(raw){
  return raw.toLowerCase()
    .replace(/end\s+if\b/g,'end if').replace(/end\s+for\b/g,'end for')
    .replace(/end\s+while\b/g,'end while').replace(/end\s+function\b/g,'end function')
    .replace(/else\s+if\b/g,'else if')
    .replace(/\u2260|<>/g,'!=').replace(/\u2265/g,'>=')<=')
    .replace(/,\s*/g,', ')
    .replace(/\u2264/g,'<=')
    .replace(/,\s*/g,', ').replace(/\s+/g,' ').trim();
}
function has(t,p){return t.includes(p.toLowerCase());}
function checkCrit(answer,cr){
  const t=norm(answer);
  if(cr.need_all){
    for(const item of cr.need_all){
      if(Array.isArray(item)){if(!item.some(p=>has(t,p)))return{label:cr.label,passed:false,msg:cr.fix,ok:cr.ok};}
      else{if(!has(t,item))return{label:cr.label,passed:false,msg:cr.fix,ok:cr.ok};}
    }
    return{label:cr.label,passed:true,msg:cr.ok,ok:cr.ok};
  }
  if(cr.must){
    const passed=cr.must.some(p=>has(t,p));
    return{label:cr.label,passed,msg:passed?cr.ok:cr.fix,ok:cr.ok};
  }
  return{label:cr.label,passed:true,msg:cr.ok,ok:cr.ok};
}
function validate(answer,criteria){return criteria.map(cr=>checkCrit(answer,cr));}

  if(p>=rs.length-1)return'mostly';
  return'developing';
}

          <button class="tabt" onclick="st('${c.m2f}')" style="border-radius:0 6px 0 0;background:${mtab===c.m2f?"#D97706":"#2C2C2C"};color:${mtab===c.m2f?"#1A1A1A":"#888"};border-bottom:${mtab===c.m2f?"none":"1px solid #4A4A4A"};font-weight:${mtab===c.m2f?700:400}">${c.m2l}</button>
        </div>
        <pre style="border-radius:${mtab===c.m1f?"0 6px 6px 6px":"6px 0 6px 6px"}">${esc(p[mtab])}</pre>
        <p style="font-size:12px;color:#888;margin-top:8px;font-family:'Segoe UI',system-ui,sans-serif">${c.note}</p>
      </div>`:"";
    fhtml=`<div style="background:${vd.bg};border-radius:12px;padding:18px 22px;margin-bottom:16px;border:1px solid ${vd.br}">
      <div style="font-size:15px;font-weight:700;color:${vd.hd};margin-bottom:14px;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.02em">${vd.lb}</div>
      ${rows}
      <div class="two">
        <div class="mc"><div class="sub">Well done</div><div style="font-size:13px;color:#C8C4BA;line-height:1.6">✓ ${esc(praise?.ok||"You’ve made a start.")}</div></div>
        <div class="mc"><div class="sub">One thing to fix</div><div style="font-size:13px;color:#C8C4BA;line-height:1.6">→ ${esc((fix?.msg||"Review and try again.").split("\n")[0])}</div></div>
      </div>
      <button class="tog" onclick="tm()">${showM?"Hide model answer ▲":"See model answer ▼"}</button>
      ${mblock}
    </div>`;
  }
  document.getElementById("app").innerHTML=`
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">${dots}<span style="font-size:11px;color:#888;font-family:'Segoe UI',system-ui,sans-serif;margin-left:8px">${c.done.size}/10 strong</span></div>
      <div style="display:flex;gap:8px"><button class="nav" onclick="go(${cur-1})">← Prev</button><button class="nav" onclick="go(${cur+1})">Next →</button></div>
    </div>
    <div class="card">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px">
        <span style="font-size:16px;font-weight:700;color:#EDE9DF">${esc(p.title)}</span>
        <span class="badge" style="background:${d.bg};color:${d.tx}">${p.difficulty}</span>
        <span style="font-size:11px;color:#888;font-family:'Segoe UI',system-ui,sans-serif;margin-left:auto">Construct: <strong style="color:#C8C4BA">${esc(p.construct)}</strong></span>
      </div>
      <div class="sub">${c.stimHead}</div>${stim}
      <button class="hint" onclick="th()">${showH?hideH+" ▲":c.hintLabel+" ▼"}</button>
      ${showH?hint:""}
    </div>
    <div class="card">
      <div class="sub">${c.ansHead}</div>
      <textarea id="code" placeholder="${c.ansPh}"></textarea>
      <div style="text-align:right;margin-top:12px"><button class="chk" onclick="chk()">Check my answer →</button></div>
    </div>
    ${fhtml}
  </div>`;
  const ta=document.getElementById("code");
  if(ta){ta.value=saved;ta.addEventListener("input",e=>saved=e.target.value);}
}
function go(i){cur=(i+10)%10;fb=null;showH=false;showM=false;saved='';mtab=CFG[mode].m1f;render();}
function th(){saved=document.getElementById("code")?.value||saved;showH=!showH;render();}
function tm(){showM=!showM;render();}
function st(t){mtab=t;render();}
function chk(){
  const ans=(document.getElementById("code")?.value||saved||"").trim();
  if(!ans)return;
  saved=ans;
  const c=CFG[mode];const p=c.qs[cur];
  const rs=validate(ans,p.validation[c.val]||[]);
  const ov=verdict(rs);
  fb={rs,ov};
  if(ov==="strong")c.done.add(p.id);
  showM=false;render();
}
switchMode('A');
</script>
</body>
</html>
